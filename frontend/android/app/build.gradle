/**
 * Android app module build configuration
 * 
 * Key configurations:
 * - Applies Chaquopy plugin to embed Python runtime in the Android app
 * - Configures Python packages (faiss, onnxruntime, pywhispercpp)
 * - Sets up React Native autolinking
 * - Enables large heap for ML model memory requirements
 */
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.chaquo.python"

react {
}

def enableProguardInReleaseBuilds = false

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.drivelegal"
    defaultConfig {
        applicationId "com.drivelegal"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    sourceSets {
        main {
            // Tells Chaquopy where to find Python modules
            python.srcDir "src/main/python"
        }
    }
    chaquopy {
        defaultConfig {
            buildPython "python3"
            pip {
                install "faiss-cpu==1.7.4"
                install "onnxruntime==1.17.0"
                install "pywhispercpp==1.3.0"
                install "numpy==1.24.3"
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    debugImplementation("com.facebook.react:flipper-integration")
}
