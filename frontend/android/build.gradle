/**
 * Root Gradle build configuration
 * Defines Android SDK versions and build dependencies
 * Includes Chaquopy plugin for embedding Python in Android
 */
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 26          // Android 8.0 minimum
        compileSdkVersion = 34      // Android 14 compile target
        targetSdkVersion = 34       // Android 14 runtime target
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.chaquo.python:gradle:15.0.1")  // Chaquopy plugin
    }
}

apply plugin: "com.facebook.react.rootproject"
